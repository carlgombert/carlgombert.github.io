<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alexander Graham Bell - Then Play a Game!</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #f0f0f0;
        box-sizing: border-box;
      }
      h1 {
        color: #333;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      button:hover {
        background: #45a049;
      }
      #content-area {
        display: none;
        margin-top: 20px;
        width: 100%;
        max-width: 600px;
      }
      
      #image-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        height: 500px;
      }
      #image-container img {
        max-width: 45%;
        height: 100%;
        object-fit: fill;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      #image-container img:first-child {
        flex: 1;
        max-width: 45%;
      }
      #image-container img:last-child {
        flex: 1;
        max-width: 45%;
      }
      #game-area {
        margin-top: 30px;
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      #question {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #333;
      }
      .option-btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        background: #e7e7e7;
        border: 2px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        text-align: left;
        transition: background 0.2s;
      }
      .option-btn:hover:not(:disabled) {
        background: #d4d4d4;
      }
      .option-btn.correct {
        background: #4caf50;
        color: white;
        border-color: #388e3c;
      }
      .option-btn.wrong {
        background: #f44336;
        color: white;
        border-color: #d32f2f;
      }
      .option-btn:disabled {
        cursor: not-allowed;
        opacity: 0.8;
      }
      #result {
        margin-top: 15px;
        font-size: 16px;
        font-weight: bold;
      }
      #next-btn {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        display: none;
      }
      #next-btn:hover {
        background: #1976d2;
      }
      #score {
        margin-top: 10px;
        font-size: 16px;
        color: #555;
      }
      #reset-btn {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        background: #ff9800;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        display: none;
      }
      #reset-btn:hover {
        background: #f57c00;
      }
      .game-title {
        text-align: center;
        margin-bottom: 20px;
        font-size: 22px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <h1>Alexander Graham Bell</h1>
    <button id="showContentBtn">Show Alexander Graham Bell</button>
    <div id="content-area">
      <div id="image-container">
        <img
          src="https://media.licdn.com/dms/image/v2/D5603AQHAS7kvaNKz5g/profile-displayphoto-scale_200_200/B56ZxOJRjbKAAY-/0/1770837580641?e=2147483647&v=beta&t=_0V8CoSO6UGV0T9A5dLX-tAYtWwz9VtzANI7LvXmrxc"
          alt="Alexander Graham Bell"
        />
        <img
          src="https://csdl-images.ieeecomputer.org/trans/tb/2022/06/figures/karpu-3118018.gif"
          alt="Alexander Graham Bell - Vintage Portrait"
        />
      </div>
      <div id="game-area">
        <div class="game-title">🎮 Alexander Graham Bell Quiz 🎮</div>
        <div id="question"></div>
        <div id="options"></div>
        <div id="result"></div>
        <button id="next-btn">Next Question ▶</button>
        <button id="reset-btn">Play Again 🔄</button>
        <div id="score"></div>
      </div>
    </div>
    <script>
      const questions = [
        {
          question: "What did Alexander Graham Bell invent?",
          options: ["Light bulb", "Telephone", "Airplane", "Radio"],
          correct: 1,
        },
        {
          question: "In which year was Alexander Graham Bell born?",
          options: ["1847", "1855", "1832", "1860"],
          correct: 0,
        },
        {
          question: "What was Alexander Graham Bell's nationality?",
          options: ["American", "British", "Scottish-born Canadian", "French"],
          correct: 2,
        },
        {
          question: "What famous phrase did Bell say in the first telephone call?",
          options: [
            "Hello, world!",
            "Mr. Watson, come here, I want to see you.",
            "The phone is ringing!",
            "Can you hear me now?",
          ],
          correct: 1,
        },
        {
          question: "What other field did Bell heavily research?",
          options: ["Astronomy", "Genetics", "Sound and hearing for the deaf", "Geology"],
          correct: 2,
        },
      ];

      let currentQuestion = 0;
      let score = 0;
      let answered = false;

      const contentArea = document.getElementById("content-area");
      const questionEl = document.getElementById("question");
      const optionsEl = document.getElementById("options");
      const resultEl = document.getElementById("result");
      const nextBtn = document.getElementById("next-btn");
      const resetBtn = document.getElementById("reset-btn");
      const scoreEl = document.getElementById("score");
      const showBtn = document.getElementById("showContentBtn");

      showBtn.addEventListener("click", function () {
        if (contentArea.style.display === "none" || contentArea.style.display === "") {
          contentArea.style.display = "block";
          showBtn.textContent = "Hide Alexander Graham Bell";
          if (currentQuestion === 0 && !answered) {
            loadQuestion();
          }
        } else {
          contentArea.style.display = "none";
          showBtn.textContent = "Show Alexander Graham Bell";
        }
      });

      function loadQuestion() {
        answered = false;
        const q = questions[currentQuestion];
        questionEl.textContent = `Question ${currentQuestion + 1} of ${questions.length}: ${q.question}`;
        optionsEl.innerHTML = "";
        resultEl.textContent = "";
        nextBtn.style.display = "none";
        resetBtn.style.display = "none";
        updateScore();

        q.options.forEach((opt, index) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.textContent = `${String.fromCharCode(65 + index)}. ${opt}`;
          btn.addEventListener("click", function () {
            if (answered) return;
            answered = true;
            const correct = index === q.correct;
            if (correct) {
              score++;
              this.classList.add("correct");
              resultEl.textContent = "✅ Correct! Well done!";
              resultEl.style.color = "#4CAF50";
            } else {
              this.classList.add("wrong");
              document.querySelectorAll(".option-btn")[q.correct].classList.add("correct");
              resultEl.textContent = `❌ Wrong! The correct answer was ${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}`;
              resultEl.style.color = "#f44336";
            }
            updateScore();
            document.querySelectorAll(".option-btn").forEach((b) => (b.disabled = true));
            if (currentQuestion < questions.length - 1) {
              nextBtn.style.display = "inline-block";
            } else {
              // End of quiz
              resultEl.innerHTML += `<br><br><strong>Quiz complete! Your final score: ${score} / ${questions.length}</strong>`;
              if (score === questions.length) {
                resultEl.innerHTML += " 🌟 Perfect!";
              } else if (score >= questions.length / 2) {
                resultEl.innerHTML += " 👍 Good job!";
              } else {
                resultEl.innerHTML += " 👊 Try again!";
              }
              resetBtn.style.display = "inline-block";
            }
          });
          optionsEl.appendChild(btn);
        });
      }

      function updateScore() {
        scoreEl.textContent = `Score: ${score} / ${questions.length}`;
      }

      nextBtn.addEventListener("click", function () {
        currentQuestion++;
        loadQuestion();
      });

      resetBtn.addEventListener("click", function () {
        currentQuestion = 0;
        score = 0;
        answered = false;
        loadQuestion();
      });
    </script>
  </body>
</html>
