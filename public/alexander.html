<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander Graham Bell</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #image-container {
            margin-top: 20px;
            display: none;
        }
        #image-container img {
            max-width: 400px;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <button id="showImageBtn">Show Alexander Graham Bell</button>
    <div id="image-container">
        <img id="bellImage" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Alexander_Graham_Bell.jpg/800px-Alexander_Graham_Bell.jpg" alt="Alexander Graham Bell">
    </div>
    <script>
        document.getElementById('showImageBtn').addEventListener('click', function() {
            var container = document.getElementById('image-container');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
            } else {
                container.style.display = 'block';
            }
        });
    </script>
</body>
</html>
